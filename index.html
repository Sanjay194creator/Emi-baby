<!DOCTYPE html>
<html>
<head>
    <title>For Emi ❤️</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #ffe6f0;
            margin-top: 100px;
        }
        h1 {
            color: #ff3366;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
        }
        #yes {
            background-color: #4CAF50;
            color: white;
        }
        #no {
            background-color: #ff4d4d;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>Emi ❤️</h1>
    <h2>Will you be my forever?</h2>

    <button id="yes" onclick="yesClicked()">Yes 💖</button>
    <button id="no" onmouseover="moveButton()">No 😜</button>

    <script>
        function yesClicked() {
            document.body.innerHTML = "<h1>Yayyyy! I Love You Emi ❤️💍</h1>";
        }

        function moveButton() {
            var button = document.getElementById("no");
            button.style.top = Math.random() * window.innerHeight + "px";
            button.style.left = Math.random() * window.innerWidth + "px";
        }
    </script>

</body>
</html>
